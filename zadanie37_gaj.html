<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 37</title>
</head>
<body>
<script>

var rok_gaj = prompt("Podaj rok od kiedy JavaScript jest w użyciu:");

document.write("Wczytany rok = " + rok_gaj + "<br><br>");

if (rok_gaj == 1995) {
    document.write("<font color='blue' size='4'>Brawo znasz rok od kiedy działa JavaScript</font>");
}
else {
    document.write("<font color='red' size='7'>Źle musisz jeszcze poczytać</font>");
}

document.write("<br><br>");

document.write("Twoja rozdzielczość ekranu to: " + screen.width + "x" + screen.height + "<br>");

if (screen.width < 800 || screen.height < 600) {
    document.write("Rozdzielczość ekranu powinna być większa niż 800x600<br>");
}

var w = window.innerWidth;
var h = window.innerHeight;

document.write("Szerokość przeglądarki: " + w + ",  Wysokość przeglądarki: " + h);

</script>

</body>
</html>
