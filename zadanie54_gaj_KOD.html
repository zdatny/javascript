<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>Gajewski Z54_JS</title>   
</head>
<body>

<div style="font-size:20px; font-family:monospace; line-height: 1.0;">
<script>

    var a_gaj = 5; 
    var b_gaj = 25; 

    for (var i_gaj = 1; i_gaj <= b_gaj; i_gaj++) {
        document.write("*");
    }
    document.write("<br>");

    for (var i_gaj = 1; i_gaj <= a_gaj - 2; i_gaj++) {
        document.write("*"); // lewa ścianka

        for (var j_gaj = 1; j_gaj <= b_gaj - 2; j_gaj++) {
            document.write("&nbsp;"); 
        }

        document.write("*<br>"); // prawa ścianka i przejście do nowej linii
    }

    for (var i_gaj = 1; i_gaj <= b_gaj; i_gaj++) {
        document.write("*");
    }

</script>
</div>

</body>
