<!DOCTYPE html>
 <head>
 <title>Sprawdzenie danych Gajewski</title>
 <meta charset="utf-8">
 </head>
<body>
<div style="color:red;font-size:50px;">
 <script language="JavaScript">
 do {
var liczba1=prompt("wysokość=","");
 var h_gaj=parseFloat(liczba1);
 }
 while ( h_gaj<=0);
 do {
var liczba1=prompt("podstawę=","");
 var a_gaj=parseFloat(liczba1);
 }
 while(!( a_gaj>0));
var Pole=a_gaj*h_gaj/2;
 document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
 </script>
</div>
</body>
</html>
