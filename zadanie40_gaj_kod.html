<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Z40_JS</title> 
</head>
<body>
<div style="color:red;font-size:50px;">
    <script language="JavaScript">
        var x = prompt("podaj argument x=", "");
        var x_gaj = parseFloat(x);
        document.write("wykonał Gajewski<br>");
        document.write("czytany argument x=" + x_gaj.toFixed(2) + "<br>");
        function f_gaj(x_gaj) {
            if (x_gaj >= 2) { 
                return 9; 
            }

            else if (x_gaj >= 0 && x_gaj < 2) { 
                return Math.pow(x_gaj, 3) + 1; 
            }

            else if (x_gaj > -2 && x_gaj < 0) { 
                return Math.pow(x_gaj + 1, 2); 
            }

            else { 
                return 1; 
            }
        }

        var wynik = f_gaj(x_gaj);
        document.write("f(" + x_gaj.toFixed(2) + ")=" + wynik.toFixed(2) + "<br>");
    </script>
</div>
</body>
</html>
<!-- Gajewski Z40_JS -->
