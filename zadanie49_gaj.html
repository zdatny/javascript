<!DOCTYPE html>
 <head>
 <title>Sprawdzenie danych Twoje nazwisko </title>
 <meta charset="utf-8">
 </head>
<body>
<div style="color:red;font-size:50px;">
 <script language="JavaScript">
 do {
    var a_gaj=parseFloat(prompt("bok a=",""));
    var b_gaj=parseFloat(prompt("bok b=",""));
    var c_gaj=parseFloat(prompt("bok c=",""));
document.write("sprawdzam warunki dla trójkąta dla wczytanych danych"+"<br>");  
 }
 while 
(!((a_gaj>0)&&(b_gaj>0)&&(c_gaj>0)&&(a_gaj+b_gaj>c_gaj)&&(a_gaj+c_gaj>b_gaj)&&(c_gaj+b_gaj>a_gaj)));
document.write("wyrok: trójkąt się zamyka oraz boki są dodatnie");
 </script>
</div>
</body>
</html>
