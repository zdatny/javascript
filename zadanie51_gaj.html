<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 51</title>
</head>
<body>
<div style="color:red;font-size:50px;">
<script language="JavaScript">
do {
var liczba1=prompt("n=","");
var n_gaj=parseFloat(liczba1);
}
while(n_gaj<0);
if(n_gaj==0){silnia_gaj=1;
document.write("n="+n_gaj+"<br>"+n_gaj+"!="+silnia_gaj);
}
if(n_gaj>0){silnia_gaj=1;
for(i_gaj=1;i_gaj<=n_gaj;i_gaj++)
silnia_gaj=silnia_gaj*i_gaj;
document.write("n="+n_gaj+"<br>"+n_gaj+"!="+silnia_gaj);
}
</script>
</div>
</body>
</html>
