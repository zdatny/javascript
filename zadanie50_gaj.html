<html>
    <head>
        <title>Gajewski Z50_JS</title>   
    </head>
    <body>
        <div style="color:red;font-size:50px;">
            <script language="JavaScript">
                suma_gaj=0;
                for(i_g=1;i_g<=1000000;i_g++)
            {
                suma_gaj=suma_gaj+1/i_g;
            }
            document.write("suma = "+ suma_gaj.toFixed(2)+"<br>");
            </script>
        </div>
    </body>
</html>
