<body>
<textarea cols="90" rows="30">
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Gajewski Z55_JS</title>   
</head>
<body>

<div style="font-size:20px; font-family:monospace; line-height: 1.0;">
<script>

    var a_gaj = parseInt(prompt("Podaj wysokość a:",));
    var b_gaj = parseInt(prompt("Podaj szerokość b:",));

    for (var i_gaj = 1; i_gaj <= b_gaj; i_gaj++) {
        document.write("*");
    }
    document.write("<br>");

    var wiersz_gaj = "*";
    for (var i_gaj = 1; i_gaj <= (b_gaj - 2); i_gaj++) {
        wiersz_gaj = wiersz_gaj + "&nbsp;"; 
    }
    wiersz_gaj = wiersz_gaj + "*";

    for (var i_gaj = 1; i_gaj <= (a_gaj - 2); i_gaj++) {
        document.write(wiersz_gaj + "<br>");
    }

    for (var i_gaj = 1; i_gaj <= b_gaj; i_gaj++) {
        document.write("*");
    }

</script>
</div>

</body>
</html> 
</textarea>
</body>
</html>
