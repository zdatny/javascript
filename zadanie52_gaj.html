<body>
<div style="font-size:20px;">
<script>
for (var i_gaj = 1; i_gaj <= 10; i_gaj++)
{
    for (var k_gaj = 1; k_gaj <= i_gaj; k_gaj++)
    {
        document.write("&nbsp;");
    }
    document.write(i_gaj + "<br>");
}
</script>
